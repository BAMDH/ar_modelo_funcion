<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: transparent;
    }

    #ar-button {
      background: white;
      border-radius: 8px;
      border: none;
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<model-viewer
  src="modelo.glb"

  ar
  ar-modes="scene-viewer webxr"

  camera-controls
  auto-rotate

  shadow-intensity="1"

  environment-image="neutral">

  <button slot="ar-button" id="ar-button">
    Ver en tu espacio
  </button>

</model-viewer>

</body>
</html>
